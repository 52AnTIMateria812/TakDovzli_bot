<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ТАК ДОВЕЗЛИ?</title>
    <!-- Подключение Telegram Web App API -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- ШАПКА -->
        <header id="app-header">
            <button id="back-button" class="hidden">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <h1 id="header-title">ТАК ДОВЕЗЛИ?</h1>
        </header>

        <!-- ПРЕДСТАВЛЕНИЕ: КАТАЛОГ -->
        <main id="view-catalog" class="view active">
            <div class="search-container">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="search-input" placeholder="Искать по магазину">
            </div>

            <div class="categories-section">
                <div class="section-header">
                    <h2>Категории</h2>
                    <button class="collapse-btn">Свернуть <span>&#x2303;</span></button>
                </div>
                <div class="categories-scroll" id="categories-list">
                    <!-- Категории будут вставлены здесь -->
                </div>
            </div>

            <div class="catalog-section">
                <h2 id="catalog-title">Каталог</h2>
                <div class="products-grid" id="products-grid">
                    <!-- Товары будут вставлены здесь -->
                </div>
            </div>
        </main>

        <!-- ПРЕДСТАВЛЕНИЕ: ДЕТАЛИ ТОВАРА -->
        <main id="view-product" class="view hidden">
            <div class="product-carousel" id="product-carousel">
                <!-- Здесь будет изображение -->
            </div>
            <div class="product-info-container">
                <div class="product-title-row">
                    <h2 id="product-detail-title">Название</h2>
                    <button class="heart-btn" id="product-detail-heart">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                    </button>
                </div>
                <p class="product-price" id="product-detail-price">0 ₽</p>
                <div class="product-description-section">
                    <h3>О товаре</h3>
                    <p id="product-detail-desc">Описание товара...</p>
                </div>
            </div>
            <div class="bottom-action-bar">
                <div class="quantity-selector">
                    <button id="qty-minus">-</button>
                    <span id="qty-value">0 шт.</span>
                    <button id="qty-plus">+</button>
                </div>
                <button id="add-to-cart-btn" class="primary-btn">Добавить</button>
            </div>
        </main>

        <!-- ПРЕДСТАВЛЕНИЕ: КОРЗИНА -->
        <main id="view-cart" class="view hidden">
            <div id="cart-empty-message" class="hidden" style="text-align: center; margin-top: 50px;">Корзина пуста</div>
            
            <div id="cart-content">
                <div class="cart-items-list" id="cart-items-list">
                    <!-- Элементы корзины будут вставлены здесь -->
                </div>

                <div class="checkout-form">
                    <h3>Покупатель</h3>
                    
                    <div class="form-group">
                        <label>Напишите ваше Имя</label>
                        <input type="text" id="buyer-name" placeholder="Напишите ваше Имя">
                        <span class="error-text hidden" id="error-name">Некорректное имя</span>
                    </div>

                    <div class="form-group">
                        <label>Напишите ваш телефон</label>
                        <div class="phone-input">
                            <span class="flag-prefix">🇷🇺 +7</span>
                            <input type="tel" id="buyer-phone" placeholder="999 000-00-00">
                        </div>
                        <span class="error-text hidden" id="error-phone">Некорректный номер телефона</span>
                    </div>

                    <div class="form-group">
                        <label>Напишите адрес</label>
                        <input type="text" id="buyer-address" placeholder="Напишите адрес">
                        <span class="error-text hidden" id="error-address">Некорректный адрес</span>
                    </div>

                    <div class="form-group">
                        <label>Напишите комментарий</label>
                        <textarea id="buyer-comment" placeholder="Напишите комментарий"></textarea>
                    </div>

                    <button class="promo-btn">Ввести промокод</button>

                    <div class="cart-summary">
                        <div class="summary-row">
                            <span>Стоимость товаров:</span>
                            <span id="summary-subtotal">0 ₽</span>
                        </div>
                        <div class="summary-row total-row">
                            <span>Итого:</span>
                            <span id="summary-total">0 ₽</span>
                        </div>
                    </div>
                </div>

                <div class="recommendations-section">
                    <h3>Вы смотрели</h3>
                    <div class="products-grid" id="recommendations-grid">
                        <!-- Рекомендации -->
                    </div>
                </div>

                <div class="checkout-footer">
                    <button id="checkout-btn" class="primary-btn disabled">Оформить заказ</button>
                </div>
            </div>
        </main>

        <!-- ПРЕДСТАВЛЕНИЕ: ПРОФИЛЬ -->
        <main id="view-profile" class="view hidden">
            <div class="profile-container">
                <div class="profile-header">
                    <div class="profile-avatar">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </div>
                    <div class="profile-info">
                        <h2 id="profile-name">Имя пользователя</h2>
                        <p id="profile-username">@username</p>
                    </div>
                </div>
                
                <div class="profile-menu">
                    <div class="menu-item">
                        <span>История заказов</span>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
                    </div>
                    <div class="menu-item">
                        <span>Настройки</span>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
                    </div>
                    <div class="menu-item">
                        <span>Поддержка</span>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
                    </div>
                </div>
            </div>
        </main>

        <!-- НИЖНЯЯ НАВИГАЦИЯ -->
        <nav id="bottom-nav">
            <button class="nav-item active" data-view="view-catalog">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                <span>Каталог</span>
            </button>
            <button class="nav-item" data-view="view-cart">
                <div class="cart-icon-container">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                    <span id="cart-badge" class="badge hidden">0</span>
                </div>
                <span>Корзина</span>
            </button>
            <button class="nav-item" data-view="view-profile">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span>Профиль</span>
            </button>
        </nav>
    </div>
    <script src="app.js"></script>
</body>
</html>
